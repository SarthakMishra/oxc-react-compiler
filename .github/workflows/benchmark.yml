name: Benchmark

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build NAPI binding
        run: |
          cd napi/react-compiler
          npm install
          npx napi build --release

      - name: Run cargo tests
        run: cargo test

      - name: Install benchmark dependencies
        run: cd benchmarks && npm install

      - name: Run benchmarks
        run: cd benchmarks && node bench.mjs --format json --iterations 50

      - name: Check snapshots
        run: cd benchmarks && node bench.mjs --check-snapshots

      - name: Install E2E test dependencies
        run: cd tests/e2e && npm install

      - name: Run E2E tests
        run: cd tests/e2e && npx vitest run

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'benchmarks/results.json';
            if (!fs.existsSync(resultsPath)) {
              console.log('No results.json found, skipping comment');
              return;
            }
            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf-8'));
            const fmtNs = (ns) => {
              if (ns >= 1_000_000) return (ns / 1_000_000).toFixed(2) + 'ms';
              if (ns >= 1_000) return (ns / 1_000).toFixed(1) + 'µs';
              return ns + 'ns';
            };

            let body = '## Benchmark Results\n\n';
            body += '| Fixture | Size | LOC | Wall p50 | Rust p50 |\n';
            body += '|---------|------|-----|----------|----------|\n';
            for (const r of results.results) {
              body += `| ${r.name} | ${r.size_tier} | ${r.loc} | ${fmtNs(r.wall.p50)} | ${fmtNs(r.rust.p50)} |\n`;
            }
            body += `\nMemory: RSS=${(results.memory.rss_bytes / 1024 / 1024).toFixed(1)}MB\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## Benchmark Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Update baseline on main
        if: github.ref == 'refs/heads/main'
        run: |
          cp benchmarks/results.json benchmarks/baseline.json 2>/dev/null || true
